<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>풍무농산 주문서</title>
  <link rel="icon" href="./assets/pungmu-logo.svg?v=modern-1" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800;900&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ["Noto Sans KR", "sans-serif"] },
          colors: {
            farm: {
              green: "#004225",
              leaf: "#5c971f",
              cream: "#fffaf0",
              line: "#e4e8df",
              ink: "#080a08"
            },
            carrot: "#ff8a21"
          },
          boxShadow: {
            bottomBar: "0 -12px 28px rgba(0,0,0,.10)",
            soft: "0 14px 34px rgba(0,66,37,.08)"
          }
        }
      }
    };
  </script>
  <style>
    * { -webkit-tap-highlight-color: transparent; }
    html { scroll-behavior: smooth; }
    body { background: #fff; color: #080a08; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { scrollbar-width: none; }
    .product-image::before {
      content: attr(data-emoji);
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      color: #004225;
      font-size: 34px;
      background: linear-gradient(135deg, #f0f6ea, #fff3df);
    }
    .product-image img {
      position: absolute;
      inset: 0;
      z-index: 1;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .qty-input { display: none; }
    .drawer-open { transform: translateX(0); }
    .history-open { display: block; }
  </style>
</head>
<body class="font-sans">
  <div id="menuOverlay" class="fixed inset-0 z-40 hidden bg-black/35"></div>
  <nav id="sideMenu" class="fixed inset-y-0 left-0 z-50 w-[280px] -translate-x-full bg-white p-6 shadow-2xl transition-transform duration-200" aria-label="풍무농산 메뉴">
    <div class="flex items-center gap-3">
      <img src="./assets/pungmu-logo.svg?v=modern-1" alt="" class="h-12 w-12 rounded-2xl object-contain" />
      <div>
        <strong class="block text-xl font-black tracking-[-0.06em]">풍무농산</strong>
        <span class="text-sm font-bold text-zinc-500">청년가게</span>
      </div>
    </div>
    <div class="mt-8 grid gap-2 text-[15px] font-extrabold">
      <a class="rounded-2xl bg-zinc-50 px-4 py-3" href="https://band.us/" target="_blank" rel="noreferrer">입고 공지 보러가기</a>
      <a class="rounded-2xl bg-zinc-50 px-4 py-3" href="https://band.us/" target="_blank" rel="noreferrer">네이버 밴드 바로가기</a>
      <button class="rounded-2xl bg-zinc-50 px-4 py-3 text-left" type="button" id="menuHistoryBtn">내 주문내역</button>
      <a class="rounded-2xl bg-zinc-50 px-4 py-3" href="tel:010-0000-0000">문의 전화하기</a>
    </div>
  </nav>

  <div class="mx-auto min-h-screen max-w-[520px] bg-white pb-28">
    <header class="sticky top-0 z-30 grid min-h-20 grid-cols-[54px_1fr_54px] items-center border-b border-farm-line bg-white/95 px-2 backdrop-blur">
      <button type="button" id="menuOpenBtn" class="grid h-12 place-items-center text-3xl leading-none" aria-label="메뉴 열기">☰</button>
      <div class="text-center leading-none">
        <div class="text-[24px] font-black tracking-[-0.08em]">풍무농산</div>
        <div class="mt-1 text-[16px] font-black tracking-[-0.08em]">- 청년가게 -</div>
      </div>
      <button type="button" id="headerHistoryBtn" class="text-[14px] font-black tracking-[-0.04em]">내역</button>
    </header>

    <section class="sticky top-20 z-20 border-b border-farm-line bg-white/95 pb-3 backdrop-blur">
      <div class="no-scrollbar flex justify-center gap-1 overflow-x-auto px-9 pt-1" aria-label="주문 가능 날짜">
        <button type="button" class="date-pill rounded-lg border border-farm-green bg-farm-green px-4 py-2 text-white" data-day-tab="today">
          <strong class="block text-[15px] font-black tracking-[-0.05em]">오늘</strong>
          <span class="mt-1 block text-[13px] font-extrabold">예약중</span>
        </button>
        <button type="button" class="date-pill rounded-lg border border-farm-line bg-white px-4 py-2" data-day-tab="tomorrow">
          <strong class="block text-[15px] font-black tracking-[-0.05em]">내일</strong>
          <span class="mt-1 block text-[13px] font-extrabold">입고예정</span>
        </button>
        <button type="button" class="date-pill rounded-lg border border-farm-line bg-white px-4 py-2" data-day-tab="later">
          <strong class="block text-[15px] font-black tracking-[-0.05em]">모레</strong>
          <span class="mt-1 block text-[13px] font-extrabold">준비중</span>
        </button>
      </div>
      <p id="dateStatus" class="mx-4 mt-2 rounded-2xl bg-[#eef7e9] px-4 py-2 text-center text-[13px] font-extrabold text-farm-green">
        오늘 주문 가능한 상품입니다.
      </p>
    </section>

    <section class="border-b border-farm-line bg-white px-4 py-3">
      <div class="no-scrollbar flex gap-2 overflow-x-auto">
        <button type="button" class="category-chip whitespace-nowrap rounded-full bg-farm-green px-4 py-2 text-sm font-black text-white" data-category-filter="all">전체 상품</button>
        <button type="button" class="category-chip whitespace-nowrap rounded-full border border-farm-line px-4 py-2 text-sm font-black" data-category-filter="event">이벤트 특가</button>
        <button type="button" class="category-chip whitespace-nowrap rounded-full border border-farm-line px-4 py-2 text-sm font-black" data-category-filter="fruit">과일</button>
        <button type="button" class="category-chip whitespace-nowrap rounded-full border border-farm-line px-4 py-2 text-sm font-black" data-category-filter="vegetable">채소</button>
        <span class="whitespace-nowrap rounded-full bg-orange-50 px-4 py-2 text-sm font-black text-orange-700">현장결제</span>
      </div>
    </section>

    <main>
      <section id="eventSection" class="pt-2">
        <div id="eventList"></div>
      </section>

      <section id="fruitSection">
        <h2 class="px-5 pb-1 pt-5 text-[22px] font-black tracking-[-0.07em]">과일</h2>
        <div id="productList"></div>
      </section>

      <section id="vegetableSection">
        <h2 class="px-5 pb-1 pt-5 text-[22px] font-black tracking-[-0.07em]">채소</h2>
        <div id="vegetableList"></div>
      </section>

      <section id="checkoutPanel" class="mx-3 mt-6 rounded-[28px] bg-zinc-50 p-5">
        <div class="flex items-start justify-between gap-4">
          <div>
            <h2 class="text-[24px] font-black tracking-[-0.07em]">주문 정보</h2>
            <p class="mt-1 text-sm font-bold text-zinc-500">이름과 연락처만 입력하면 접수됩니다.</p>
          </div>
          <img src="./assets/pungmu-logo.svg?v=modern-1" alt="" class="h-12 w-12 rounded-2xl bg-white object-contain p-1" />
        </div>

        <form id="orderForm" class="mt-5 grid gap-3">
          <label class="grid gap-1 text-sm font-black">
            주문자명
            <input id="customerName" name="customerName" required type="text" placeholder="예: 홍길동" class="h-13 rounded-2xl border border-zinc-200 bg-white px-4 py-3 text-base font-bold outline-none focus:border-farm-green" />
          </label>
          <label class="grid gap-1 text-sm font-black">
            연락처
            <input id="phone" name="phone" required type="tel" placeholder="예: 010-1234-5678" class="h-13 rounded-2xl border border-zinc-200 bg-white px-4 py-3 text-base font-bold outline-none focus:border-farm-green" />
          </label>
          <label class="flex items-center gap-2 rounded-2xl bg-white px-4 py-3 text-sm font-extrabold">
            <input id="rememberProfile" name="rememberProfile" type="checkbox" class="h-5 w-5 accent-farm-green" />
            이름과 연락처 기억하기
          </label>
          <label class="flex items-start gap-2 rounded-2xl bg-white px-4 py-3 text-sm font-bold leading-6 text-zinc-600">
            <input id="agree" name="agree" required type="checkbox" class="mt-1 h-5 w-5 shrink-0 accent-farm-green" />
            주문 접수 및 현장 결제 안내를 위한 이름과 연락처 수집에 동의합니다.
          </label>
        </form>

        <div class="mt-5 rounded-3xl bg-white p-4">
          <h3 class="text-lg font-black tracking-[-0.05em]">주문 요약</h3>
          <div id="summaryList" class="mt-3 grid gap-2 text-sm font-bold text-zinc-600">
            <div class="flex justify-between gap-3"><span>선택한 상품이 없습니다.</span><strong>0원</strong></div>
          </div>
          <div class="mt-4 flex justify-between border-t border-zinc-100 pt-4 text-lg font-black">
            <span>총 결제예정금액</span>
            <span id="grandTotal">0원</span>
          </div>
        </div>

        <div id="submitStatus" class="mt-4 text-center text-sm font-black text-farm-green"></div>
      </section>

      <section id="historyPanel" class="mx-3 mt-5 hidden rounded-[28px] border border-farm-line bg-white p-5 shadow-soft">
        <div class="flex items-center justify-between">
          <h2 class="text-[22px] font-black tracking-[-0.07em]">내 주문내역</h2>
          <span class="text-xs font-bold text-zinc-400">7일 보관</span>
        </div>
        <div id="historyList" class="mt-4 grid gap-3"></div>
      </section>
    </main>
  </div>

  <div class="fixed inset-x-0 bottom-0 z-30 mx-auto grid max-w-[520px] grid-cols-[120px_1fr] gap-2 bg-white/95 p-2 shadow-bottomBar backdrop-blur">
    <button type="button" id="toggleHistoryBtnMobile" class="h-[62px] rounded-xl border border-farm-green bg-white text-[18px] font-black text-farm-green">주문내역</button>
    <button type="button" id="submitOrderBtnMobile" class="h-[62px] rounded-xl bg-farm-green text-[19px] font-black text-white">주문하기</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./app-config.js"></script>
  <script src="./shared.js"></script>
  <script>
    const defaultSettings = {
      description: "풍무농산 과일 공동구매 주문서입니다.",
      orderDeadline: "오늘 오후 6시 마감",
      contact: "문의 010-0000-0000",
      notices: ["주문은 입고 수량 기준으로 선착순 접수됩니다.", "현장결제 기준으로 접수됩니다."],
      events: [
        { id: "event-strawberry", emoji: "🍓", name: "12:00 오픈 딸기 특가", desc: "1인 최대 1개 / 수량한정", label: "오픈 특가", openTime: "12:00", originalPrice: 12000, salePrice: 8900, stock: 20, enabled: true }
      ],
      products: [
        { id: "shine", emoji: "🍇", name: "프리미엄 샤인머스캣", desc: "고당도 선별 / 1박스", price: 15900, stock: 12 },
        { id: "apple", emoji: "🍎", name: "아삭한 세척사과", desc: "가정용 / 5입", price: 9900, stock: 18 },
        { id: "pear", emoji: "🍐", name: "달큰한 배", desc: "선물용 / 3입", price: 13900, stock: 10 }
      ],
      vegetables: [
        { id: "tomato", emoji: "🍅", name: "대추방울토마토", desc: "신선포장 / 1팩", price: 7900, stock: 20 },
        { id: "cucumber", emoji: "🥒", name: "오이 3입", desc: "아삭한 당일 입고", price: 3900, stock: 15 },
        { id: "lettuce", emoji: "🥬", name: "상추 1봉", desc: "쌈채소 / 신선 포장", price: 2900, stock: 18 }
      ]
    };

    const storage = window.OrderFormStorage;
    const currency = new Intl.NumberFormat("ko-KR");
    const customerProfileKey = "pungmu-customer-profile";
    const customerRememberKey = "pungmu-customer-remember-profile";
    const customerHistoryKey = "pungmu-customer-order-history";
    let settings = structuredClone(defaultSettings);
    let activeCategoryFilter = "all";
    let eventRefreshTimer = null;

    const productList = document.getElementById("productList");
    const vegetableList = document.getElementById("vegetableList");
    const eventList = document.getElementById("eventList");
    const summaryList = document.getElementById("summaryList");
    const grandTotal = document.getElementById("grandTotal");
    const form = document.getElementById("orderForm");
    const submitStatus = document.getElementById("submitStatus");
    const historyPanel = document.getElementById("historyPanel");
    const historyList = document.getElementById("historyList");
    const dateStatus = document.getElementById("dateStatus");
    const sideMenu = document.getElementById("sideMenu");
    const menuOverlay = document.getElementById("menuOverlay");
    const submitOrderBtnMobile = document.getElementById("submitOrderBtnMobile");

    const productImageMap = {
      "🍓": "https://images.unsplash.com/photo-1464965911861-746a04b4bca6?auto=format&fit=crop&crop=entropy&w=520&q=82",
      "🍇": "https://images.unsplash.com/photo-1537640538966-79f369143f8f?auto=format&fit=crop&crop=entropy&w=520&q=82",
      "🍊": "https://images.unsplash.com/photo-1582979512210-99b6a53386f9?auto=format&fit=crop&crop=entropy&w=520&q=82",
      "🍎": "https://images.unsplash.com/photo-1560806887-1e4cd0b6cbd6?auto=format&fit=crop&crop=entropy&w=520&q=82",
      "🍐": "https://images.unsplash.com/photo-1514756331096-242fdeb70d4a?auto=format&fit=crop&crop=entropy&w=520&q=82",
      "🍅": "https://images.unsplash.com/photo-1561136594-7f68413baa99?auto=format&fit=crop&crop=entropy&w=520&q=82",
      "🥒": "https://images.unsplash.com/photo-1604977042946-1eecc30f269e?auto=format&fit=crop&crop=entropy&w=520&q=82",
      "🥬": "https://images.unsplash.com/photo-1622205313162-be1d5712a43f?auto=format&fit=crop&crop=entropy&w=520&q=82",
      "default": "https://images.unsplash.com/photo-1610832958506-aa56368176cf?auto=format&fit=crop&crop=entropy&w=520&q=82"
    };

    function readLocalJson(key, fallbackValue) {
      try {
        const raw = localStorage.getItem(key);
        return raw ? JSON.parse(raw) : fallbackValue;
      } catch {
        return fallbackValue;
      }
    }

    function writeLocalJson(key, value) {
      localStorage.setItem(key, JSON.stringify(value));
    }

    function normalizeSettings(value) {
      return {
        ...structuredClone(defaultSettings),
        ...(value || {}),
        events: Array.isArray(value?.events) ? value.events : defaultSettings.events,
        products: Array.isArray(value?.products) ? value.products : defaultSettings.products,
        vegetables: Array.isArray(value?.vegetables) ? value.vegetables : defaultSettings.vegetables
      };
    }

    function getProductImage(product) {
      const name = `${product.name || ""} ${product.desc || ""}`;
      if (product.image) return product.image;
      if (productImageMap[product.emoji]) return productImageMap[product.emoji];
      if (name.includes("딸기")) return productImageMap["🍓"];
      if (name.includes("포도") || name.includes("샤인")) return productImageMap["🍇"];
      if (name.includes("오렌지") || name.includes("감귤")) return productImageMap["🍊"];
      if (name.includes("사과")) return productImageMap["🍎"];
      if (name.includes("배")) return productImageMap["🍐"];
      if (name.includes("토마토")) return productImageMap["🍅"];
      if (name.includes("오이")) return productImageMap["🥒"];
      if (name.includes("상추") || name.includes("쌈")) return productImageMap["🥬"];
      return productImageMap.default;
    }

    function getTodayOpenDate(openTime) {
      const [hour = "0", minute = "0"] = String(openTime || "00:00").split(":");
      const date = new Date();
      date.setHours(Number(hour), Number(minute), 0, 0);
      return date;
    }

    function isEventOpen(event) {
      return new Date() >= getTodayOpenDate(event.openTime);
    }

    function getDiscountRate(originalPrice, salePrice) {
      const original = Number(originalPrice || 0);
      const sale = Number(salePrice || 0);
      if (!original || !sale || sale >= original) return 0;
      return Math.round(((original - sale) / original) * 100);
    }

    function getEffectivePrice(item) {
      return Number(item.salePrice || item.price || 0);
    }

    function getEnabledEvents() {
      return (settings.events || []).filter((event) => event.enabled !== false);
    }

    function getAllOrderItems() {
      return [
        ...getEnabledEvents().map((event) => ({ ...event, type: "event", price: Number(event.salePrice || 0) })),
        ...(settings.products || []).map((item) => ({ ...item, type: "fruit" })),
        ...(settings.vegetables || []).map((item) => ({ ...item, type: "vegetable" }))
      ];
    }

    function getMaxQuantity(item) {
      const stock = Math.max(Number(item.stock || 0), 0);
      if (item.type === "event") {
        return isEventOpen(item) ? Math.min(stock, 1) : 0;
      }
      return stock;
    }

    function createCard(item, category) {
      const max = getMaxQuantity(item);
      const soldOut = max <= 0;
      const discount = item.type === "event" ? getDiscountRate(item.originalPrice, item.salePrice) : 0;
      const stockText = soldOut
        ? (item.type === "event" && !isEventOpen(item) ? `${item.openTime} 오픈 예정` : "품절")
        : `${Math.max(Number(item.stock || 0), 0)}개 남았어요!`;
      const priceMarkup = item.type === "event"
        ? `<div class="mt-1 flex flex-wrap items-center gap-2">
            <span class="text-sm font-bold text-zinc-400 line-through">${currency.format(item.originalPrice || 0)}원</span>
            <span class="text-[21px] font-black">${currency.format(item.salePrice || 0)}원</span>
            ${discount ? `<span class="rounded-full bg-orange-100 px-2 py-0.5 text-xs font-black text-orange-700">${discount}%</span>` : ""}
          </div>`
        : `<p class="mt-1 text-[20px] font-medium tracking-[-0.05em]">가격 · ${currency.format(item.price || 0)}원</p>`;

      const article = document.createElement("article");
      article.className = "border-b border-farm-line bg-white px-3 py-6";
      article.dataset.category = category;
      article.innerHTML = `
        ${item.type === "event" ? `<div class="mb-2 ml-[150px] text-[13px] font-black text-farm-green">${item.label || "오늘의 특가"} · 1인 최대 1개</div>` : ""}
        <div class="grid grid-cols-[132px_1fr] gap-[18px]">
          <div class="product-image relative h-[132px] w-[132px] overflow-hidden rounded-lg border border-farm-line bg-zinc-100" data-emoji="${item.emoji || "🥬"}">
            <img src="${getProductImage(item)}" alt="${item.name} 사진" loading="lazy" decoding="async" onerror="this.remove();" />
          </div>
          <div class="min-w-0">
            <h3 class="text-[22px] font-black leading-[1.28] tracking-[-0.065em]">${item.name}</h3>
            ${priceMarkup}
            <p class="mt-1 text-[16px] font-bold tracking-[-0.04em] text-zinc-700">${item.desc || "당일 입고 상품"}</p>
            <div id="stock-${item.id}" class="mt-1 text-[21px] font-black tracking-[-0.05em] ${soldOut ? "text-zinc-400" : "text-farm-ink"}">${stockText}</div>
            <p class="mt-1 text-[17px] font-black tracking-[-0.05em]">12:00 ~ 20:00 수령 가능</p>
          </div>
        </div>
        <div class="mt-5 grid grid-cols-2 gap-2">
          <button type="button" class="h-[66px] rounded-xl border border-zinc-300 bg-white text-[20px] font-medium" data-detail-product="${item.id}">상세보기</button>
          <div class="grid h-[66px] grid-cols-3 overflow-hidden rounded-xl border border-zinc-300">
            <button type="button" class="text-[28px] font-bold disabled:text-zinc-300" data-step-product="${item.id}" data-step="-1" ${soldOut ? "disabled" : ""}>-</button>
            <span id="qty-view-${item.id}" class="grid place-items-center text-[21px] font-medium">0개</span>
            <button type="button" class="text-[28px] font-bold disabled:text-zinc-300" data-step-product="${item.id}" data-step="1" ${soldOut ? "disabled" : ""}>+</button>
          </div>
          <input class="qty-input" id="qty-${item.id}" data-product-id="${item.id}" value="" />
        </div>
      `;
      return article;
    }

    function renderProducts() {
      eventList.innerHTML = "";
      productList.innerHTML = "";
      vegetableList.innerHTML = "";
      getEnabledEvents().forEach((item) => eventList.appendChild(createCard({ ...item, type: "event" }, "event")));
      (settings.products || []).forEach((item) => productList.appendChild(createCard({ ...item, type: "fruit" }, "fruit")));
      (settings.vegetables || []).forEach((item) => vegetableList.appendChild(createCard({ ...item, type: "vegetable" }, "vegetable")));
      bindProductButtons();
      updateStockAndSummary();
      applyCategoryFilter(activeCategoryFilter);
      scheduleNextEventRefresh();
    }

    function bindProductButtons() {
      document.querySelectorAll("[data-step-product]").forEach((button) => {
        button.addEventListener("click", () => {
          const item = getAllOrderItems().find((candidate) => candidate.id === button.dataset.stepProduct);
          const input = document.getElementById(`qty-${button.dataset.stepProduct}`);
          if (!item || !input) return;
          const max = getMaxQuantity(item);
          const next = Math.min(Math.max(Number(input.value || 0) + Number(button.dataset.step || 0), 0), max);
          input.value = next || "";
          updateStockAndSummary();
        });
      });

      document.querySelectorAll("[data-detail-product]").forEach((button) => {
        button.addEventListener("click", () => {
          const item = getAllOrderItems().find((candidate) => candidate.id === button.dataset.detailProduct);
          if (!item) return;
          alert(`${item.name}\n\n${item.desc || "상세 설명이 없습니다."}\n가격 ${currency.format(getEffectivePrice(item))}원`);
        });
      });
    }

    function scheduleNextEventRefresh() {
      if (eventRefreshTimer) window.clearTimeout(eventRefreshTimer);
      const now = new Date();
      const nextOpen = getEnabledEvents()
        .filter((event) => !isEventOpen(event))
        .map((event) => getTodayOpenDate(event.openTime))
        .filter((date) => date > now)
        .sort((a, b) => a - b)[0];
      if (!nextOpen) return;
      eventRefreshTimer = window.setTimeout(renderProducts, Math.max(nextOpen.getTime() - now.getTime() + 1000, 1000));
    }

    function applyCategoryFilter(category) {
      activeCategoryFilter = category;
      document.querySelectorAll(".category-chip").forEach((button) => {
        const active = button.dataset.categoryFilter === category;
        button.classList.toggle("bg-farm-green", active);
        button.classList.toggle("text-white", active);
        button.classList.toggle("border", !active);
      });
      document.querySelectorAll("[data-category]").forEach((card) => {
        card.classList.toggle("hidden", category !== "all" && card.dataset.category !== category);
      });
      document.getElementById("eventSection").classList.toggle("hidden", !(category === "all" || category === "event"));
      document.getElementById("fruitSection").classList.toggle("hidden", !(category === "all" || category === "fruit"));
      document.getElementById("vegetableSection").classList.toggle("hidden", !(category === "all" || category === "vegetable"));
    }

    function handleDayTab(day) {
      document.querySelectorAll(".date-pill").forEach((button) => {
        const active = button.dataset.dayTab === day;
        button.classList.toggle("bg-farm-green", active);
        button.classList.toggle("text-white", active);
        button.classList.toggle("border-farm-green", active);
      });
      dateStatus.textContent = day === "today"
        ? "오늘 주문 가능한 상품입니다."
        : day === "tomorrow"
          ? "내일 입고 상품은 관리자 등록 후 열어둘 수 있습니다."
          : "모레 상품은 아직 준비 중입니다.";
    }

    function getSelectedItems() {
      return getAllOrderItems()
        .map((item) => {
          const input = document.getElementById(`qty-${item.id}`);
          return { ...item, unitPrice: getEffectivePrice(item), qty: input ? Number(input.value || 0) : 0 };
        })
        .filter((item) => item.qty > 0);
    }

    function updateStockAndSummary() {
      const selectedItems = getSelectedItems();
      getAllOrderItems().forEach((item) => {
        const input = document.getElementById(`qty-${item.id}`);
        const qtyView = document.getElementById(`qty-view-${item.id}`);
        const stockBadge = document.getElementById(`stock-${item.id}`);
        if (!input || !qtyView || !stockBadge) return;
        const max = getMaxQuantity(item);
        const safeQty = Math.min(Math.max(Number(input.value || 0), 0), max);
        input.value = safeQty || "";
        qtyView.textContent = `${safeQty}개`;
        if (max <= 0) {
          stockBadge.textContent = item.type === "event" && !isEventOpen(item) ? `${item.openTime} 오픈 예정` : "품절";
          return;
        }
        const remaining = Math.max(Number(item.stock || 0), 0) - safeQty;
        stockBadge.textContent = `${remaining}개 남았어요!`;
        stockBadge.classList.toggle("text-orange-600", remaining <= 5);
      });

      if (selectedItems.length === 0) {
        summaryList.innerHTML = '<div class="flex justify-between gap-3"><span>선택한 상품이 없습니다.</span><strong>0원</strong></div>';
        grandTotal.textContent = "0원";
        submitOrderBtnMobile.textContent = "주문하기";
        return;
      }

      let total = 0;
      summaryList.innerHTML = selectedItems.map((item) => {
        const itemTotal = item.unitPrice * item.qty;
        total += itemTotal;
        return `<div class="flex justify-between gap-3"><span>${item.name} × ${item.qty}</span><strong>${currency.format(itemTotal)}원</strong></div>`;
      }).join("");
      grandTotal.textContent = `${currency.format(total)}원`;
      submitOrderBtnMobile.textContent = `주문하기 · ${currency.format(total)}원`;
    }

    function saveCustomerProfile() {
      const remember = document.getElementById("rememberProfile").checked;
      writeLocalJson(customerRememberKey, remember);
      if (!remember) {
        localStorage.removeItem(customerProfileKey);
        return;
      }
      const formData = new FormData(form);
      writeLocalJson(customerProfileKey, {
        customerName: String(formData.get("customerName") || ""),
        phone: String(formData.get("phone") || "")
      });
    }

    function loadCustomerProfile() {
      const remember = readLocalJson(customerRememberKey, false);
      document.getElementById("rememberProfile").checked = Boolean(remember);
      if (!remember) return;
      const profile = readLocalJson(customerProfileKey, null);
      if (!profile) return;
      document.getElementById("customerName").value = profile.customerName || "";
      document.getElementById("phone").value = profile.phone || "";
    }

    function getLocalOrderHistory() {
      const cutoff = Date.now() - (7 * 24 * 60 * 60 * 1000);
      return readLocalJson(customerHistoryKey, []).filter((item) => new Date(item.created_at).getTime() >= cutoff);
    }

    function saveLocalOrderHistory(order) {
      const history = getLocalOrderHistory();
      history.unshift({
        id: order.id || crypto.randomUUID(),
        cancel_token: order.cancel_token || null,
        event_key: order.event_key || null,
        created_at: order.created_at || new Date().toISOString(),
        customer_name: order.customer_name,
        phone: order.phone,
        items: order.items || [],
        total_amount: order.total_amount || 0,
        paid_at: order.paid_at || null,
        status: order.status || "new"
      });
      writeLocalJson(customerHistoryKey, history.slice(0, 20));
      renderOrderHistory();
    }

    function renderOrderHistory() {
      const history = getLocalOrderHistory();
      if (history.length === 0) {
        historyList.innerHTML = '<div class="rounded-2xl bg-zinc-50 p-4 text-sm font-bold text-zinc-500">아직 이 휴대폰에 저장된 주문내역이 없습니다.</div>';
        return;
      }
      historyList.innerHTML = history.map((order) => {
        const dateText = new Date(order.created_at).toLocaleString("ko-KR", { month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit" });
        const itemsText = (order.items || []).map((item) => `${item.name} ${item.qty}개`).join(", ");
        const statusText = order.status === "paid" ? "결제완료" : order.status === "canceled" ? "취소됨" : "접수됨";
        const cancelButton = order.status === "paid" || order.status === "canceled"
          ? ""
          : `<button type="button" class="mt-3 rounded-xl bg-zinc-100 px-3 py-2 text-sm font-black" data-cancel-order="${order.id}" data-cancel-token="${order.cancel_token || ""}">주문 취소</button>`;
        return `
          <div class="rounded-3xl border border-zinc-100 bg-zinc-50 p-4">
            <strong class="block text-base font-black">${dateText} · ${statusText}</strong>
            <div class="mt-2 text-sm font-bold leading-6 text-zinc-600">${itemsText || "상품 정보 없음"}<br />총 ${currency.format(order.total_amount || 0)}원</div>
            ${cancelButton}
          </div>
        `;
      }).join("");
      document.querySelectorAll("[data-cancel-order]").forEach((button) => {
        button.addEventListener("click", async () => {
          if (!confirm("이 주문을 취소할까요? 결제완료 주문은 취소할 수 없습니다.")) return;
          try {
            await storage.cancelOrder(button.dataset.cancelOrder, button.dataset.cancelToken);
            const updated = getLocalOrderHistory().map((order) => String(order.id) === String(button.dataset.cancelOrder) ? { ...order, status: "canceled" } : order);
            writeLocalJson(customerHistoryKey, updated);
            renderOrderHistory();
          } catch (error) {
            alert(`주문 취소 실패: ${error.message}`);
          }
        });
      });
    }

    function toggleOrderHistory() {
      historyPanel.classList.toggle("hidden");
      renderOrderHistory();
      if (!historyPanel.classList.contains("hidden")) {
        historyPanel.scrollIntoView({ behavior: "smooth", block: "start" });
      }
    }

    function getBusinessDateKey(date = new Date()) {
      return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, "0")}-${String(date.getDate()).padStart(2, "0")}`;
    }

    function normalizeText(value) {
      return String(value || "").replace(/\s+/g, "").toLowerCase();
    }

    function createEventOrderKey(customerName, phone, eventId) {
      return [getBusinessDateKey(), normalizeText(customerName), String(phone || "").replace(/\D/g, ""), eventId].join("|");
    }

    function findDuplicateEventOrder(customerName, phone, eventItems) {
      if (eventItems.length === 0) return null;
      const activeHistory = getLocalOrderHistory().filter((order) => order.status !== "canceled");
      return eventItems.find((eventItem) => {
        const key = createEventOrderKey(customerName, phone, eventItem.id);
        return activeHistory.some((order) => order.event_key === key);
      });
    }

    function getOrderDraft() {
      const selectedItems = getSelectedItems();
      if (!form.reportValidity()) return null;
      if (selectedItems.length === 0) {
        alert("최소 1개 이상의 상품을 선택해주세요.");
        return null;
      }
      const formData = new FormData(form);
      const customerName = String(formData.get("customerName") || "").trim();
      const phone = String(formData.get("phone") || "").trim();
      const eventItems = selectedItems.filter((item) => item.type === "event");
      const duplicateEvent = findDuplicateEventOrder(customerName, phone, eventItems);
      if (duplicateEvent) {
        alert(`오늘 이미 주문한 이벤트 상품입니다: ${duplicateEvent.name}`);
        return null;
      }
      const total = selectedItems.reduce((sum, item) => sum + item.unitPrice * item.qty, 0);
      const itemsText = selectedItems.map((item) => `- ${item.name} ${item.qty}개 (${currency.format(item.unitPrice * item.qty)}원)`).join("\n");
      const orderText = ["[풍무농산 주문서]", `주문자명: ${customerName}`, `연락처: ${phone}`, "결제 방식: 현장결제", "", "[주문 상품]", itemsText, "", `총 금액: ${currency.format(total)}원`].join("\n");
      return {
        payload: {
          customer_name: customerName,
          phone,
          apartment_name: "",
          address_detail: "",
          gate_code: "",
          delivery_type: "현장수령",
          pay_method: "현장결제",
          memo: "",
          items: selectedItems,
          event_key: eventItems[0] ? createEventOrderKey(customerName, phone, eventItems[0].id) : null,
          cancel_token: crypto.randomUUID(),
          total_amount: total,
          order_text: orderText,
          status: "new"
        }
      };
    }

    async function submitOrder() {
      const draft = getOrderDraft();
      if (!draft) return;
      if (!confirm("주문을 접수하시겠습니까?")) return;
      submitStatus.textContent = "주문을 저장하는 중입니다...";
      try {
        const savedOrder = await storage.createOrder(draft.payload);
        saveCustomerProfile();
        saveLocalOrderHistory({ ...draft.payload, ...(savedOrder || {}) });
        resetAfterSubmit();
        submitStatus.textContent = storage.isCloudMode()
          ? "주문이 접수되었습니다. 감사합니다."
          : "주문이 접수되었습니다. 이 휴대폰 주문내역에 저장됐습니다.";
      } catch (error) {
        submitStatus.textContent = `주문 저장 실패: ${error.message}`;
      }
    }

    function resetAfterSubmit() {
      const remember = document.getElementById("rememberProfile").checked;
      getAllOrderItems().forEach((item) => {
        const input = document.getElementById(`qty-${item.id}`);
        if (input) input.value = "";
      });
      document.getElementById("agree").checked = false;
      if (!remember) {
        document.getElementById("customerName").value = "";
        document.getElementById("phone").value = "";
      }
      updateStockAndSummary();
    }

    function toggleMenu(open) {
      sideMenu.classList.toggle("drawer-open", open);
      menuOverlay.classList.toggle("hidden", !open);
    }

    document.getElementById("submitOrderBtnMobile").addEventListener("click", submitOrder);
    document.getElementById("toggleHistoryBtnMobile").addEventListener("click", toggleOrderHistory);
    document.getElementById("headerHistoryBtn").addEventListener("click", toggleOrderHistory);
    document.getElementById("menuHistoryBtn").addEventListener("click", () => {
      toggleMenu(false);
      toggleOrderHistory();
    });
    document.getElementById("menuOpenBtn").addEventListener("click", () => toggleMenu(true));
    menuOverlay.addEventListener("click", () => toggleMenu(false));
    document.querySelectorAll(".category-chip").forEach((button) => {
      button.addEventListener("click", () => applyCategoryFilter(button.dataset.categoryFilter));
    });
    document.querySelectorAll(".date-pill").forEach((button) => {
      button.addEventListener("click", () => handleDayTab(button.dataset.dayTab));
    });

    async function init() {
      settings = normalizeSettings(await storage.loadSettings(defaultSettings));
      renderProducts();
      loadCustomerProfile();
      renderOrderHistory();
    }

    init();
  </script>
</body>
</html>
